name: "${APP:?APP is set by mise.toml. Run: mise run up}"

x-healthcheck-defaults: &healthcheck-defaults
  interval: 2s
  timeout: 5s
  retries: 30

services:
  postgres:
    image: "${POSTGRES_IMAGE:?POSTGRES_IMAGE is set by mise.toml. Run: mise run up}"
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: app
    ports:
      - name: postgres
        host_ip: 127.0.0.1
        target: 5432
        published: "${POSTGRES_PORT:-5432}"
        protocol: tcp
    volumes:
      - type: volume
        source: pgdata
        target: /var/lib/postgresql
    healthcheck:
      <<: *healthcheck-defaults
      test: ["CMD-SHELL", "pg_isready -U app -d app"]

  nats:
    image: "${NATS_IMAGE:?NATS_IMAGE is set by mise.toml. Run: mise run up}"
    command: ["--http_port", "8222"]
    ports:
      - name: nats-client
        host_ip: 127.0.0.1
        target: 4222
        published: "${NATS_PORT:-4222}"
        protocol: tcp
      - name: nats-monitor
        host_ip: 127.0.0.1
        target: 8222
        published: "${NATS_HTTP_PORT:-8222}"
        protocol: tcp
    healthcheck:
      <<: *healthcheck-defaults
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8222/healthz"]

volumes:
  pgdata:

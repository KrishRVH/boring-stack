title = "Project secret scanning"

[extend]
useDefault = true

[allowlist]
description = "VCS metadata, local outputs, and vendored assets"
paths = [
  '''(^|/)\.git/''',
  '''(^|/)bin/''',
  '''(^|/)coverage/''',
  '''(^|/)dist/''',
  '''(^|/)out/''',
  '''(^|/)sbom/''',
  '''(^|/)tmp/''',
  '''(^|/)vendor/''',
]
